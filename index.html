<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-area">
        <div class="black"></div>
        <div class="content">
            <h1>Your Own Image Search Engine</h1>
            <p>Search And Download Any Image Within A Second</p>
            <div class="search-box">
                <input type="text" placeholder="Search Images...">
                <div class="btn">
                    <button><img src="search.svg" alt="img"></button>
                </div>
            </div>
        </div>
    </div>

    
    <!-- Image Gallery  -->
    <div class="image-gallery">
        <ul class="images">
            <li class="image"> <img src="1.avif" alt="img" class="photo"></li>
            <li class="image"><img src="3.avif" alt="img"  class="photo"></li>
            <li class="image"><img src="4.avif" alt="img"  class="photo"></li>
            <li class="image"><img src="5.avif" alt="img"  class="photo"></li>
            <li class="image"><img src="2.avif" alt="img"  class="photo"></li>
            <li class="image"><img src="6.avif" alt="img"  class="photo"></li>
            <li class="image"><img src="7.avif" alt="img"  class="photo"></li>
            <li class="image"><img src="8.avif" alt="img"  class="photo"></li>
            <li class="image"><img src="9.avif" alt="img"  class="photo"></li>
            <li class="image"><img src="10.avif" alt="img" class="photo"></li>
        </ul>
        <button id="load">More</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
